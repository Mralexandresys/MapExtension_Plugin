name: Release

on:
  workflow_dispatch:
    inputs:
      modloader_tag:
        description: "Optional StarRupture-Plugin-SDK tag to build against (example: release-2026.04.09-200640 or v1.2.0)"
        required: false
        default: ""
        type: string
      plugin_version:
        description: "Plugin version suffix (example: v0.2)"
        required: true
        type: string
      draft:
        description: Create the GitHub release as a draft
        required: true
        default: true
        type: boolean
      build_author:
        description: Optional build author override
        required: false
        default: ""
        type: string

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Resolve release metadata
        id: meta
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          $sdkTag = [string]'${{ inputs.modloader_tag }}'
          $sdkTag = $sdkTag.Trim()
          if ([string]::IsNullOrWhiteSpace($sdkTag)) {
            $release = gh api repos/AlienXAXS/StarRupture-Plugin-SDK/releases/latest | ConvertFrom-Json
            $sdkTag = [string]$release.tag_name
          }
          if ([string]::IsNullOrWhiteSpace($sdkTag)) {
            throw "Could not resolve a StarRupture-Plugin-SDK tag from modloader_tag or the latest published release."
          }
          if ($sdkTag.StartsWith("release-")) {
            $coreVersion = $sdkTag.Substring("release-".Length)
          } elseif ($sdkTag.StartsWith("v")) {
            $coreVersion = $sdkTag
          } else {
            throw "Unsupported SDK tag format: '$sdkTag'. Expected 'release-...' or 'v...'."
          }

          $pluginVersion = [string]'${{ inputs.plugin_version }}'
          if ([string]::IsNullOrWhiteSpace($pluginVersion)) {
            throw "plugin_version is required."
          }
          if ($pluginVersion -notmatch '^v[0-9A-Za-z][0-9A-Za-z._-]*$') {
            throw "Invalid plugin_version '$pluginVersion'. Expected a value like v0.2."
          }

          $trimmedAuthor = [string]'${{ inputs.build_author }}'
          $trimmedAuthor = $trimmedAuthor.Trim()
          if ([string]::IsNullOrWhiteSpace($trimmedAuthor)) {
            $trimmedAuthor = [string]'${{ github.triggering_actor }}'
          }
          if ([string]::IsNullOrWhiteSpace($trimmedAuthor)) {
            $trimmedAuthor = [string]'${{ github.actor }}'
          }

          $pluginTag = "ML-$coreVersion-$pluginVersion"

          $matchingRefs = gh api "repos/$env:REPO/git/matching-refs/tags/$pluginTag" | ConvertFrom-Json
          if ($matchingRefs.Count -gt 0) {
            throw "Tag '$pluginTag' already exists in $env:REPO."
          }

          "SDK_TAG=$sdkTag" >> $env:GITHUB_OUTPUT
          "PLUGIN_TAG=$pluginTag" >> $env:GITHUB_OUTPUT
          "BUILD_AUTHOR=$trimmedAuthor" >> $env:GITHUB_OUTPUT

      - name: Checkout MapExtension_Plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Checkout StarRupture-Plugin-SDK
        uses: actions/checkout@v4
        with:
          repository: AlienXAXS/StarRupture-Plugin-SDK
          ref: ${{ steps.meta.outputs.SDK_TAG }}
          path: sdk
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build plugin DLLs
        shell: pwsh
        working-directory: plugin
        run: |
          $repoRoot = (Resolve-Path .).Path
          $repoRootWithSlash = "$repoRoot\"
          $sdkRoot = (Resolve-Path ..\sdk).Path
          $sdkRootWithSlash = "$sdkRoot\"

          function Find-MSBuild {
            $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
            if (Test-Path $vswhere) {
              $found = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -find 'MSBuild\**\Bin\MSBuild.exe' | Select-Object -First 1
              if ($found) {
                return $found.Trim()
              }
            }

            $fallbacks = @(
              "${env:ProgramFiles}\Microsoft Visual Studio\2022\Community\MSBuild\Current\Bin\MSBuild.exe",
              "${env:ProgramFiles}\Microsoft Visual Studio\2022\Professional\MSBuild\Current\Bin\MSBuild.exe",
              "${env:ProgramFiles}\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\MSBuild.exe",
              "${env:ProgramFiles}\Microsoft Visual Studio\2022\BuildTools\MSBuild\Current\Bin\MSBuild.exe"
            )

            foreach ($candidate in $fallbacks) {
              if (Test-Path $candidate) {
                return $candidate
              }
            }

            throw 'MSBuild.exe introuvable. Installe Visual Studio 2022 ou Build Tools avec MSBuild.'
          }

          $msbuild = Find-MSBuild
          Write-Host "Build de MapExtension_Plugin en Client Release|x64"
          Write-Host "MSBuild : $msbuild"

          & $msbuild "MapExtension_Plugin.sln" `
            /t:MapExtension_Plugin `
            /m `
            /p:Configuration="Client Release" `
            /p:Platform=x64 `
            /p:PlatformToolset=v143 `
            /p:SolutionDir="$repoRootWithSlash" `
            /p:RepoRootDir="$repoRootWithSlash" `
            /p:PluginSdkRootDir="$sdkRootWithSlash" `
            /p:PostBuildEventUseInBuild=false `
            /p:ModLoaderBuildTag="${{ steps.meta.outputs.PLUGIN_TAG }}" `
            /p:ModLoaderBuildAuthor="${{ steps.meta.outputs.BUILD_AUTHOR }}"

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          Write-Host "Build de MapExtension_Plugin en Server Release|x64"

          & $msbuild "MapExtension_Plugin.sln" `
            /t:MapExtension_Plugin `
            /m `
            /p:Configuration="Server Release" `
            /p:Platform=x64 `
            /p:PlatformToolset=v143 `
            /p:SolutionDir="$repoRootWithSlash" `
            /p:RepoRootDir="$repoRootWithSlash" `
            /p:PluginSdkRootDir="$sdkRootWithSlash" `
            /p:PostBuildEventUseInBuild=false `
            /p:ModLoaderBuildTag="${{ steps.meta.outputs.PLUGIN_TAG }}" `
            /p:ModLoaderBuildAuthor="${{ steps.meta.outputs.BUILD_AUTHOR }}"

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Build mapview bundle
        shell: pwsh
        working-directory: plugin/mapview
        run: |
          npm ci
          npm run check
          npx vite build
          Move-Item -Path "dist/index.html" -Destination "dist/MapExtensionViewer.html" -Force

      - name: Package release assets
        id: package
        shell: pwsh
        working-directory: plugin
        run: |
          $tag = "${{ steps.meta.outputs.PLUGIN_TAG }}"
          $repoRoot = (Resolve-Path .).Path
          $packageRoot = Join-Path $env:GITHUB_WORKSPACE "package"
          $clientStageRoot = Join-Path $packageRoot "MapExtension_Plugin-client"
          $clientPluginsDir = Join-Path $clientStageRoot "Plugins"
          $serverStageRoot = Join-Path $packageRoot "MapExtension_Plugin-server"
          $serverPluginsDir = Join-Path $serverStageRoot "Plugins"

          if (Test-Path $packageRoot) {
            Remove-Item $packageRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $clientPluginsDir | Out-Null
          New-Item -ItemType Directory -Force -Path $serverPluginsDir | Out-Null

          Copy-Item (Join-Path $repoRoot "build\Client Release\Plugins\MapExtension_Plugin.dll") (Join-Path $clientPluginsDir "MapExtension_Plugin.dll") -Force
          Copy-Item "mapview\dist\MapExtensionViewer.html" (Join-Path $clientStageRoot "MapExtensionViewer.html") -Force
          if (Test-Path "mapview\dist\map-tiles") {
            Copy-Item "mapview\dist\map-tiles" (Join-Path $clientStageRoot "map-tiles") -Recurse -Force
          }
          Copy-Item (Join-Path $repoRoot "build\Server Release\Plugins\MapExtension_Plugin.dll") (Join-Path $serverPluginsDir "MapExtension_Plugin.dll") -Force

          $clientZipPath = Join-Path $env:GITHUB_WORKSPACE "MapExtension_Plugin-$tag-client.zip"
          $serverZipPath = Join-Path $env:GITHUB_WORKSPACE "MapExtension_Plugin-$tag-server.zip"

          if (Test-Path $clientZipPath) {
            Remove-Item $clientZipPath -Force
          }
          if (Test-Path $serverZipPath) {
            Remove-Item $serverZipPath -Force
          }
          Compress-Archive -Path "$clientStageRoot\*" -DestinationPath $clientZipPath
          Compress-Archive -Path "$serverStageRoot\*" -DestinationPath $serverZipPath

          "CLIENT_ZIP_PATH=$clientZipPath" >> $env:GITHUB_OUTPUT
          "SERVER_ZIP_PATH=$serverZipPath" >> $env:GITHUB_OUTPUT

      - name: Create GitHub release
        if: ${{ success() }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.meta.outputs.PLUGIN_TAG }}"
          $sdkTag = "${{ steps.meta.outputs.SDK_TAG }}"
          $buildAuthor = "${{ steps.meta.outputs.BUILD_AUTHOR }}"
          $isDraft = '${{ inputs.draft }}'
          $notes = @"
          Built from StarRupture-Plugin-SDK release: $sdkTag
          Mod loader tag input: ${{ inputs.modloader_tag }}
          Plugin version input: ${{ inputs.plugin_version }}
          Build author: $buildAuthor
          "@

          $args = @(
            'release', 'create', $tag,
            "${{ steps.package.outputs.CLIENT_ZIP_PATH }}",
            "${{ steps.package.outputs.SERVER_ZIP_PATH }}",
            '--repo', '${{ github.repository }}',
            '--title', "MapExtension_Plugin $tag",
            '--notes', $notes
          )
          if ($isDraft -eq 'true') {
            $args += '--draft'
          }

          gh @args

      - name: Publish summary
        if: ${{ success() }}
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "# Release created"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ('- Plugin SDK release: `{0}`' -f '${{ steps.meta.outputs.SDK_TAG }}')
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ('- Mod loader tag input: `{0}`' -f '${{ inputs.modloader_tag }}')
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ('- Plugin tag: `{0}`' -f '${{ steps.meta.outputs.PLUGIN_TAG }}')
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ('- Build author: `{0}`' -f '${{ steps.meta.outputs.BUILD_AUTHOR }}')
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ('- Draft: `{0}`' -f '${{ inputs.draft }}')
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ('- Client zip: `{0}`' -f '${{ steps.package.outputs.CLIENT_ZIP_PATH }}')
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ('- Server zip: `{0}`' -f '${{ steps.package.outputs.SERVER_ZIP_PATH }}')
